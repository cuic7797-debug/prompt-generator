<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提示词生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
        }
        h1 { color: #333; margin-bottom: 20px; }
        .card { 
            background: white; 
            border-radius: 12px; 
            padding: 24px; 
            margin-bottom: 16px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #555; 
        }
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 14px; 
            margin-bottom: 16px; 
        }
        textarea { min-height: 120px; resize: vertical; }
        button { 
            background: #0070f3; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            width: 100%; 
        }
        button:hover { background: #0051a2; }
        #output { 
            background: #1a1a2e; 
            color: #00ff88; 
            font-family: 'Courier New', monospace; 
            white-space: pre-wrap; 
            display: none; 
        }
        .copy-btn { 
            background: #333; 
            margin-top: 12px; 
            font-size: 14px; 
        }
    </style>
</head>
<body>
    <h1>🎯 提示词生成器</h1>
    
    <div class="card">
        <label>任务描述</label>
        <textarea id="task" placeholder="例如：帮我写小红书种草文案，产品是美白精华，目标人群是25-30岁职场女性"></textarea>
        
        <label>领域</label>
        <select id="domain">
            <option value="general">通用</option>
            <option value="writing">创意写作</option>
            <option value="coding">编程开发</option>
            <option value="data">数据分析</option>
            <option value="marketing">电商营销</option>
        </select>
        
        <label>复杂度</label>
        <select id="complexity">
            <option value="basic">基础版（快速使用）</option>
            <option value="advanced">进阶版（完整流程）</option>
        </select>
        
        <button onclick="generate()">生成提示词</button>
    </div>
    
    <div class="card" id="outputCard" style="display:none;">
        <label>生成的提示词</label>
        <pre id="output"></pre>
        <button class="copy-btn" onclick="copy()">📋 复制到剪贴板</button>
    </div>

    <script>
        // 内置模板库
        const templates = {
            general: {
                basic: (task) => `你是一位专业助手，擅长完成各类任务。

任务：${task}

要求：
- 输出结构清晰，分点说明
- 语言简洁，避免冗余
- 如有不确定之处，明确标注

请直接开始。`,
                advanced: (task) => `你是一位顶级领域专家，拥有10年以上实战经验。

【任务分析】
用户核心需求：${task}
预期输出类型：[请根据任务判断并说明]

【执行框架】
步骤1：需求拆解
- 识别显式要求（用户明确说的）
- 挖掘隐式要求（用户没明说但需要的）

步骤2：方案设计
- 提供2种解决思路
- 对比优劣，推荐最优方案

步骤3：执行与输出
- 按推荐方案详细执行
- 关键决策点说明理由

【质量控制】
- 自检：输出是否符合用户原始意图？
- 边界：是否遗漏了重要约束？
- 扩展：如果需求变更，方案是否可调整？

请按以上框架执行。`
            },
            marketing: {
                basic: (task) => `你是一位资深电商文案专家。

任务：${task}

要求：
- 突出核心卖点，避免泛泛而谈
- 每版文案不超过50字
- 包含至少1个emoji
- 使用目标人群的语言风格

输出3版：
1. 功能卖点版
2. 情感共鸣版  
3. 限时促销版`,
                advanced: (task) => `你是一位小红书TOP级种草文案策略师。

【角色设定】
5年平台运营经验，擅长"真实感构建"实现高转化。

【任务】${task}

【执行流程】
步骤1：产品分析
- 识别"反直觉卖点"（用户没想到但用了回不去的功能）
- 确定与竞品的差异化

步骤2：叙事构建（SCQA-R）
- S（场景）：具体画面描写
- C（冲突）：用户真实痛点
- Q（疑问）："难道没有更好办法？"
- A（答案）：产品出现
- R（结果）：使用前后对比

步骤3：可信度增强
- 1个小吐槽（如"包装难撕"）
- 1个时间锚点（"第7天的时候..."）
- 1个感官细节（"质地像融化的冰淇淋"）

【输出规范】
- 字数：350-450字
- 结构：标题（含emoji）+ 正文 + 标签5-8个
- 合规：避免"最好""第一"，用"我觉得""个人体验"

【自检】
□ 像分享还是像广告？（目标：分享）
□ 有具体细节而非泛泛而谈？
□ 前3句能否留住读者？`
            }
        };

        function generate() {
            const task = document.getElementById('task').value.trim();
            const domain = document.getElementById('domain').value;
            const complexity = document.getElementById('complexity').value;
            
            if (!task) {
                alert('请先输入任务描述');
                return;
            }
            
            // 获取模板，如果没有则用通用模板
            const domainTemplates = templates[domain] || templates.general;
            const template = domainTemplates[complexity] || domainTemplates.basic;
            
            const result = template(task);
            
            document.getElementById('output').textContent = result;文档.getElementById('output').textContent = 结果;
            document.getElementById('outputCard').style.display = 'block';
        }
        
        function copy() {
            const text = document.getElementById('output').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制！');警告('已复制！');
            });
        }
    </script脚本></脚本>
</body></身体>
</html>
