<html lang="zh-CN">
<head>

    <style>
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #666;
            --border: #e0e0e0;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
        }
        [data-theme="dark"] {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --text: #e0e0e0;
            --text-secondary: #999;
            --border: #2a2a3e;
            --primary: #818cf8;
            --primary-light: #a5b4fc;
            --primary-dark: #6366f1;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: all 0.3s;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* 导航栏 */
        .navbar {
            background: var(--card);
            border-radius: 16px;
            padding: 16px 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .brand {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .nav-btn:hover, .nav-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-1px);
        }
        .nav-btn small { font-size: 12px; opacity: 0.8; }

        /* 三栏布局 */
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 20px;
        }

        /* 面板通用 */
        .panel {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            height: fit-content;
        }
        .panel-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }

        /* 左侧配置 */
        .form-group { margin-bottom: 16px; }
        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }
        .input-wrapper { position: relative; }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .form-textarea { min-height: 100px; resize: vertical; }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .clear-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }
        .clear-btn:hover { color: var(--danger); }

        /* 复杂度选择 */
        .complexity-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .complexity-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 8px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s;
        }
        .complexity-btn:hover {
            border-color: var(--primary-light);
            background: rgba(99,102,241,0.05);
        }
        .complexity-btn.active {
            border-color: var(--primary);
            background: rgba(99,102,241,0.1);
            color: var(--primary);
            font-weight: 600;
        }
        .complexity-btn .emoji { font-size: 18px; display: block; margin-bottom: 2px; }
        .complexity-btn .label { font-size: 12px; }
        .complexity-btn .tag {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .password-hint {
            font-size: 12px;
            color: var(--warning);
            margin-top: 6px;
            padding: 6px 10px;
            background: rgba(245,158,11,0.1);
            border-radius: 8px;
            display: none;
        }
        .password-hint.visible { display: block; }

        /* 生成按钮 */
        .generate-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99,102,241,0.3);
        }
        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 中间输出 */
        .output-area {
            min-height: 400px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
        .result-box {
            background: var(--bg);
            border-radius: 12px;
            padding: 20px;
            margin-top: 16px;
            position: relative;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .result-title { font-weight: 600; font-size: 14px; }
        .copy-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .copy-btn.copied { background: var(--success); color: white; border-color: var(--success); }
        .result-content {
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.8;
            color: var(--text);
            max-height: 500px;
            overflow-y: auto;
        }

        /* 右侧分析 */
        .score-ring {
            width: 100px;
            height: 100px;
            margin: 0 auto 16px;
            position: relative;
        }
        .score-ring svg { transform: rotate(-90deg); }
        .score-ring circle { fill: none; stroke-width: 8; }
        .score-ring .bg { stroke: var(--border); }
        .score-ring .progress { stroke: var(--primary); stroke-linecap: round; transition: stroke-dashoffset 0.5s; }
        .score-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        .score-label {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .dimension-bar {
            margin-bottom: 10px;
        }
        .dimension-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .dimension-track {
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
        }
        .dimension-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 3px;
            transition: width 0.5s;
        }

        /* 历史记录 */
        .history-item {
            padding: 10px 12px;
            border-radius: 10px;
            background: var(--bg);
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .history-item:hover {
            background: rgba(99,102,241,0.08);
            border-left-color: var(--primary);
        }
        .history-item .time { font-size: 11px; color: var(--text-secondary); }
        .history-item .task { font-weight: 500; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 模板市场 */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .template-card {
            padding: 14px;
            border-radius: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        .template-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .template-card .icon { font-size: 24px; margin-bottom: 6px; }
        .template-card .title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .template-card .desc { font-size: 12px; color: var(--text-secondary); }
        .template-card .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            background: rgba(99,102,241,0.1);
            color: var(--primary);
            margin-top: 6px;
        }

        /* 对比视图 */
        .compare-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 12px;
        }
        .compare-card {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            border: 2px solid transparent;
        }
        .compare-card.basic { border-color: var(--success); }
        .compare-card.advanced { border-color: var(--warning); }
        .compare-card.expert { border-color: var(--danger); }
        .compare-card .level {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .compare-card .content {
            font-size: 13px;
            line-height: 1.7;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        /* 优化视图 */
        .optimize-section {
            margin-bottom: 16px;
        }
        .optimize-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .optimize-content {
            background: var(--bg);
            border-radius: 10px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.7;
        }
        .issue-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-right: 6px;
            margin-bottom: 4px;
        }
        .issue-tag.warning { background: rgba(245,158,11,0.15); color: var(--warning); }
        .issue-tag.danger { background: rgba(239,68,68,0.15); color: var(--danger); }

        /* 结构图谱 */
        .structure-map {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
            padding: 12px;
            background: var(--bg);
            border-radius: 12px;
        }
        .module-tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(99,102,241,0.1);
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .module-tag.inactive {
            background: var(--bg);
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s;
            box-shadow: var(--shadow-lg);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 密码弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .modal-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .modal-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            margin-bottom: 12px;
        }
        .modal-buttons {
            display: flex;
            gap: 8px;
        }
        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .modal-btn.primary {
            background: var(--primary);
            color: white;
        }
        .modal-btn.secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        /* 移动端适配 */
        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 280px 1fr 280px; }
        }
        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
            .navbar { padding: 12px 16px; }
            .brand { font-size: 16px; }
            .nav-btn { padding: 6px 10px; font-size: 12px; }
            .compare-grid { grid-template-columns: 1fr; }
            .market-grid { grid-template-columns: 1fr; }
            .container { padding: 12px; }
            .panel { padding: 16px; }
        }

        /* 隐藏 */
        .hidden { display: none !important; }

        /* 折叠面板 */
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 8px 0;
        }
        .collapsible-content {
            max-height: 500px;
            overflow: hidden;
            transition: max-height 0.3s;
        }
        .collapsible-content.collapsed { max-height: 0; }
        .toggle-icon { transition: transform 0.3s; }
        .toggle-icon.rotated { transform: rotate(180deg); }
    </style>

<body>
    <div class="container">
        <!-- 导航栏 -->
        <div class="navbar">
            <div class="brand">🎯 提示词生成器</div>
            <div class="nav-buttons">

                        </optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">复杂度</label>
                    <div class="complexity-group">
                        <button class="complexity-btn active" onclick="setComplexity('basic')" id="btn-basic">
                            <span class="emoji">⚡</span>
                            <span class="label">基础</span>
                            <span class="tag">免费</span>
                        </button>
                        <button class="complexity-btn" onclick="setComplexity('advanced')" id="btn-advanced">
                            <span class="emoji">🔥</span>
                            <span class="label">进阶</span>
                            <span class="tag">需密码</span>
                        </button>
                        <button class="complexity-btn" onclick="setComplexity('expert')" id="btn-expert">

                    </div>

    <script>

        // ========== 复杂度选择 ==========
        function setComplexity(level) {
            // 检查是否需要密码
            if (level !== 'basic') {
                const saved = localStorage.getItem('password_' + level);
                if (!saved) {
                    pendingComplexity = level;
                    document.getElementById('modalTitle').textContent = level === 'advanced' ? '🔥 解锁进阶版' : '👑 解锁专家版';
                    document.getElementById('passwordModal').classList.add('show');
                    document.getElementById('passwordInput').value = '';
                    document.getElementById('passwordInput').focus();
                    return;
                }

            currentComplexity = level;
            document.querySelectorAll('.complexity-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + level).classList.add('active');

            const hint = document.getElementById('passwordHint');
            if (level !== 'basic') {
                hint.classList.add('visible');
            } else {
                hint.classList.remove('visible');
            }

        function verifyPassword() {
            const input = document.getElementById('passwordInput').value.trim();
            const level = pendingComplexity;

            if (!level) return;

            if (input === PASSWORDS[level]) {
                localStorage.setItem('password_' + level, 'true');
                closePasswordModal();
                currentComplexity = level;
                document.querySelectorAll('.complexity-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('btn-' + level).classList.add('active');

            const html = document.documentElement;
            const current = html.getAttribute('data-theme');

            localStorage.setItem('theme', next);

        const savedTheme = localStorage.getItem('theme');

        // ========== 清空输入 ==========
        function clearTask() {
            document.getElementById('taskInput').value = '';

        // ========== 核心生成函数 ==========
        function generate() {
            const task = document.getElementById('taskInput').value.trim();

            if (!task) {
                showToast('⚠️ 请先输入任务描述');
                document.getElementById('taskInput').focus();
                return;
            }

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span><span>生成中...</span>';

            // 模拟生成延迟
            setTimeout(() => {
                const result = generatePrompt(task, domain, currentComplexity);
                lastResult = result;

                // 显示结果
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('resultContainer').classList.remove('hidden');
                document.getElementById('resultContent').textContent = result.content;

                // 渲染结构图谱

                // 更新质量分析
                updateQuality(result.score, result.dimensions);

                // 保存历史
                saveHistory(task, domain, currentComplexity, result.content, result.score);

                // 提交到Google Forms
                submitToGoogleForms(task, domain, currentComplexity, result.score);

                // 恢复按钮
                btn.disabled = false;
                btn.innerHTML = '<span>✨</span><span>智能生成</span>';

                // 自动滚动到结果
                document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });

                game_design: '游戏设计', ui_design: 'UI设计', research: '科研论文',

            } else if (complexity === 'advanced') {
                modules = ['角色锚定', '任务解构', '执行框架', '质量控制', '输出规范'];

                dimensions = { 角色清晰度: 95, 任务可执行: 93, 结构完整度: 92, 专业深度: 90, 创新程度: 88, 输出规范: 96 };

            return { content, modules, score, dimensions };

        // ========== 结构图谱 ==========
        function renderStructure(modules) {
            const allModules = ['角色锚定', '任务解构', '执行框架', '质量控制', '示例嵌入', '迭代机制', '输出规范'];
            const container = document.getElementById('structureMap');
            container.innerHTML = allModules.map(m => {
                const active = modules.includes(m);
                return `<span class="module-tag ${active ? '' : 'inactive'}">${active ? '✅' : '❌'} ${m}</span>`;
            }).join('');
        }

        // ========== 质量分析 ==========
        function updateQuality(score, dimensions) {
            document.getElementById('scoreText').textContent = score.toFixed(1);
            const circle = document.getElementById('scoreCircle');
            const circumference = 2 * Math.PI * 42;
            const offset = circumference - (score / 10) * circumference;
            circle.style.strokeDashoffset = offset;

            const container = document.getElementById('dimensions');
            container.innerHTML = Object.entries(dimensions).map(([name, value]) => `
                <div class="dimension-bar">
                    <div class="dimension-label">
                        <span>${name}</span>
                        <span>${value}%</span>
                    </div>
                    <div class="dimension-track">
                        <div class="dimension-fill" style="width: ${value}%"></div>
                    </div>
                </div>
            `).join('');

            const suggestions = score < 8 
                ? '建议增加执行框架和示例嵌入模块，提升提示词的可执行性。可考虑升级到进阶版。' 
                : '提示词结构完整，质量优秀。如需进一步提升，可增加迭代机制模块，加入自检清单和优化方向。';
            document.getElementById('suggestions').textContent = suggestions;
        }

        // ========== 历史记录 ==========
        function saveHistory(task, domain, complexity, content, score) {
            let history = JSON.parse(localStorage.getItem('prompt_history') || '[]');
            const item = {
                id: Date.now(),
                time: new Date().toLocaleString('zh-CN'),
                task: task.substring(0, 30) + (task.length > 30 ? '...' : ''),
                domain,
                complexity,
                content,
                score
            };
            history.unshift(item);
            if (history.length > 50) history = history.slice(0, 50);
            localStorage.setItem('prompt_history', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('prompt_history') || '[]');
            const container = document.getElementById('historyList');
            if (history.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-secondary); font-size: 13px; padding: 20px;">暂无记录</div>';
                return;
            }
            container.innerHTML = history.map(item => `
                <div class="history-item" onclick="loadHistoryItem(${item.id})">
                    <div class="time">${item.time}</div>
                    <div class="task">${item.task}</div>
                    <div style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">
                        ${item.domain} · ${item.complexity === 'basic' ? '基础' : item.complexity === 'advanced' ? '进阶' : '专家'} · ${item.score}分
                    </div>
                </div>
            `).join('');
        }

        function loadHistoryItem(id) {
            const history = JSON.parse(localStorage.getItem('prompt_history') || '[]');
            const item = history.find(h => h.id === id);
            if (!item) return;

            document.getElementById('taskInput').value = item.task.replace('...', '');
            document.getElementById('domainSelect').value = item.domain;
            setComplexity(item.complexity);

            lastResult = { content: item.content, modules: [], score: item.score, dimensions: {} };
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('resultContainer').classList.remove('hidden');
            document.getElementById('resultContent').textContent = item.content;
            updateQuality(item.score, {});
            switchTab('generate');
        }

        // ========== 复制功能 ==========
        function copyResult() {
            const content = document.getElementById('resultContent').textContent;
            navigator.clipboard.writeText(content).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = '✅ 已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 复制';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // ========== Google Forms 提交 ==========
        function submitToGoogleForms(task, domain, complexity, score) {
            const device = /Mobile|Android|iPhone/i.test(navigator.userAgent) ? '手机' : '电脑';
            const complexityLabel = complexity === 'basic' ? '基础' : complexity === 'advanced' ? '进阶' : '专家';

            const formData = new FormData();
            formData.append(GOOGLE_FORM_FIELDS.task, task);
            formData.append(GOOGLE_FORM_FIELDS.domain, domain);
            formData.append(GOOGLE_FORM_FIELDS.complexity, complexityLabel);
            formData.append(GOOGLE_FORM_FIELDS.score, score.toString());
            formData.append(GOOGLE_FORM_FIELDS.device, device);

            fetch(GOOGLE_FORM_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            }).catch(() => {});

        function loadTemplate(domain, complexity, title) {
            document.getElementById('domainSelect').value = domain;
            setComplexity(complexity);
            document.getElementById('taskInput').value = '请生成一个关于' + title + '的提示词';
            switchTab('generate');
            showToast('✅ 已加载模板：' + title);
        }

        // ========== 折叠面板 ==========
        function toggleCollapse(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            content.classList.toggle('collapsed');
            icon.classList.toggle('rotated');
        }

        // ========== Toast提示 ==========
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyPassword();
