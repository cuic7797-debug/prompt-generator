<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AI提示词生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --header-h: 60px;
            --tab-h: 48px;
            --action-h: 72px;
        }

        .light {
            --bg: #f8fafc;
            --card-bg: #fff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        /* PC端布局 */
        @media (min-width: 769px) {
            .main {
                display: flex;
                gap: 24px;
                padding: 24px;
                max-width: 1400px;
                margin: 0 auto;
            }

            .config-panel {
                width: 400px;
                flex-shrink: 0;
                position: sticky;
                top: 24px;
                height: calc(100vh - 48px);
                overflow-y: auto;
            }

            .result-panel {
                flex: 1;
                min-width: 0;
            }

            .header {
                padding: 16px 24px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .mobile-only {
                display: none !important;
            }
        }

        /* 移动端/平板布局 */
        @media (max-width: 768px) {
            .main {
                padding: 12px;
                padding-bottom: calc(var(--action-h) + 12px);
            }

            .config-panel {
                display: none;
                position: fixed;
                top: calc(var(--header-h) + var(--tab-h));
                left: 0;
                right: 0;
                bottom: var(--action-h);
                z-index: 100;
                padding: 16px;
                overflow-y: auto;
                transform: translateY(100%);
                transition: transform 0.3s ease;
                background: var(--bg);
            }

            .config-panel.active {
                display: block;
                transform: translateY(0);
            }

            .result-panel {
                width: 100%;
            }

            .header {
                padding: 12px 16px;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 100;
                height: var(--header-h);
            }

            .mobile-tabs {
                display: flex;
                gap: 8px;
                padding: 0 12px;
                position: fixed;
                top: var(--header-h);
                left: 0;
                right: 0;
                z-index: 99;
                height: var(--tab-h);
                overflow-x: auto;
                scrollbar-width: none;
                background: var(--bg);
            }

            .mobile-tabs::-webkit-scrollbar {
                display: none;
            }

            .tab {
                padding: 8px 16px;
                border-radius: 20px;
                white-space: nowrap;
                font-size: 14px;
                background: var(--card-bg);
                border: 1px solid var(--border);
                color: var(--text-secondary);
            }

            .tab.active {
                background: var(--primary);
                color: white;
                border-color: var(--primary);
            }

            .mobile-action-bar {
                display: flex;
                gap: 12px;
                padding: 12px 16px;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 100;
                background: var(--card-bg);
                border-top: 1px solid var(--border);
            }

            .generate-btn {
                flex: 1;
            }

            .pc-only {
                display: none !important;
            }
        }

        .header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1::before {
            content: "✨";
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-block {
            width: 100%;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .result-card .prompt-text {
            margin-bottom: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .result-card .action-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .context-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
        }

        .context-menu.active {
            display: flex;
        }

        .context-menu-content {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 16px 16px 0 0;
            padding: 20px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .context-menu-item {
            padding: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s ease;
            cursor: pointer;
        }

        .context-menu-item:active {
            background: var(--bg);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 300;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 18px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .modal-close:active {
            background: var(--bg);
        }

        .modal-body {
            padding: 20px;
        }

        .drawer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 400;
        }

        .drawer.active {
            display: block;
        }

        .drawer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .drawer-content {
            position: absolute;
            top: 0;
            right: 0;
            width: 85%;
            max-width: 400px;
            height: 100%;
            background: var(--card-bg);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
        }

        .drawer.active .drawer-content {
            transform: translateX(0);
        }

        .drawer-item {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .drawer-item:active {
            background: var(--bg);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: var(--bg);
            color: var(--text-secondary);
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            max-width: 80%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: var(--bg);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: var(--bg);
            padding: 4px;
            border-radius: 10px;
        }

        .mode-content {
            display: none;
        }

        .mode-content.active {
            display: block;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .alert-info {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>AI提示词生成器</h1>
        <div class="header-actions">
            <button class="btn btn-secondary" id="themeToggle">🌙 切换主题</button>
            <button class="btn btn-secondary" id="menuBtn">☰ 菜单</button>
        </div>
    </header>

    <div class="mobile-tabs mobile-only">
        <button class="tab active" data-tab="generate">生成</button>
        <button class="tab" data-tab="history">历史</button>
        <button class="tab" data-tab="favorites">收藏</button>
        <button class="tab" data-tab="template">模板</button>
        <button class="tab" data-tab="settings">设置</button>
    </div>

    <div class="main-content">
        <div class="config-panel" id="configPanel">
            <div class="card">
                <div class="tabs">
                    <button class="tab-btn active" data-mode="basic">基础版</button>
                    <button class="tab-btn" data-mode="advanced">进阶版</button>
                    <button class="tab-btn" data-mode="expert">专家版</button>
                </div>

                <div class="mode-content active" id="basic-mode">
                    <div class="form-group">
                        <label>使用场景</label>
                        <select class="form-control" id="scene">
                            <option value="通用">通用场景</option>
                            <option value="内容创作">内容创作</option>
                            <option value="AI绘画">AI绘画</option>
                            <option value="编程开发">编程开发</option>
                            <option value="学习辅导">学习辅导</option>
                            <option value="办公效率">办公效率</option>
                            <option value="营销文案">营销文案</option>
                            <option value="学术研究">学术研究</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>目标平台</label>
                        <select class="form-control" id="platform">
                            <option value="通用平台">通用平台</option>
                            <optgroup label="国内平台">
                                <option value="文心一言">文心一言</option>
                                <option value="通义千问">通义千问</option>
                                <option value="豆包">豆包</option>
                                <option value="讯飞星火">讯飞星火</option>
                                <option value="智谱清言">智谱清言</option>
                            </optgroup>
                            <optgroup label="国际平台">
                                <option value="ChatGPT">ChatGPT</option>
                                <option value="Claude">Claude</option>
                                <option value="Gemini">Gemini</option>
                                <option value="Copilot">Copilot</option>
                                <option value="Midjourney">Midjourney</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>任务描述</label>
                        <textarea class="form-control" id="task" placeholder="请输入你需要AI完成的任务，越详细生成效果越好"></textarea>
                    </div>

                    <div class="form-group">
                        <label>输出要求</label>
                        <textarea class="form-control" id="requirements" placeholder="比如格式、长度、语气、受众等要求"></textarea>
                    </div>

                    <div class="form-group">
                        <label>复杂度</label>
                        <select class="form-control" id="complexity">
                            <option value="简单">简单（一句话输出）</option>
                            <option value="中等">中等（100字左右）</option>
                            <option value="复杂">复杂（结构化输出）</option>
                        </select>
                    </div>

                    <button class="btn btn-primary btn-block" id="generateBtn">✨ 立即生成</button>
                </div>

                <div class="mode-content" id="advanced-mode">
                    <div class="alert alert-info">💡 进阶版支持风格/语言等更多选项，每日可用5次</div>
                    <div id="advancedForm">
                        <div class="form-group">
                            <label>提示词风格</label>
                            <select class="form-control" id="style">
                                <option value="专业严谨">专业严谨</option>
                                <option value="生动有趣">生动有趣</option>
                                <option value="简洁明了">简洁明了</option>
                                <option value="详细具体">详细具体</option>
                                <option value="口语化">口语化</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>输出语言</label>
                            <select class="form-control" id="language">
                                <option value="中文">中文</option>
                                <option value="英文">英文</option>
                                <option value="中英双语">中英双语</option>
                                <option value="日语">日语</option>
                                <option value="韩语">韩语</option>
                                <option value="西班牙语">西班牙语</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>附加指令</label>
                            <textarea class="form-control" id="extraInstruction" placeholder="需要遵守的规则/禁止的内容"></textarea>
                        </div>
                        <button class="btn btn-secondary btn-block" id="unlockAdvancedBtn">🔓 输入密码解锁</button>
                    </div>
                    <div id="advancedContent"></div>
                </div>

                <div class="mode-content" id="expert-mode">
                    <div class="alert alert-success">🎯 专家版支持思维链、多版本方案、质检等高级功能</div>
                    <div id="expertForm">
                        <div class="form-group">
                            <label>思维链步骤</label>
                            <select class="form-control" id="chainSteps">
                                <option value="3">3步推导</option>
                                <option value="5">5步推导</option>
                                <option value="7">7步推导（更详细）</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>生成方案数量</label>
                            <select class="form-control" id="solutionCount">
                                <option value="1">1个最优方案</option>
                                <option value="3">3个备选方案</option>
                                <option value="5">5个备选方案</option>
                            </select>
                        </div>
                        <button class="btn btn-success btn-block" id="unlockExpertBtn">🔐 输入邀请码解锁</button>
                    </div>
                    <div id="expertContent"></div>
                </div>
            </div>
        </div>

        <div class="result-panel" id="resultPanel">
            <div class="tab-content active" id="generate-content">
                <div class="card">
                    <h2 style="margin-bottom:16px;">生成结果</h2>
                    <div id="resultContainer">
                        <div class="empty-state">
                            <div class="icon">📝</div>
                            <p>配置完成后点击生成，结果会在这里显示</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="history-content">
                <div class="card">
                    <h2 style="margin-bottom:16px;">历史记录</h2>
                    <div id="historyList">
                        <div class="empty-state">
                            <div class="icon">📚</div>
                            <p>暂无历史记录</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="favorites-content">
                <div class="card">
                    <h2 style="margin-bottom:16px;">收藏夹</h2>
                    <div id="favoritesList">
                        <div class="empty-state">
                            <div class="icon">⭐</div>
                            <p>暂无收藏</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="template-content">
                <div class="card">
                    <h2 style="margin-bottom:16px;">精品模板库</h2>
                    <div id="templateGrid">
                        <div class="empty-state">
                            <div class="icon">📋</div>
                            <p>专家版用户可解锁更多模板</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="settings-content">
                <div class="card">
                    <h2 style="margin-bottom:16px;">个性化设置</h2>
                    <div class="form-group">
                        <label style="display:block;margin-bottom:8px;">主题模式</label>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <button class="btn btn-secondary" data-theme="light">☀️ 浅色</button>
                            <button class="btn btn-secondary" data-theme="dark">🌙 深色</button>
                            <button class="btn btn-secondary" data-theme="auto">🔄 跟随系统</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label style="display:block;margin-bottom:8px;">数据管理</label>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <button class="btn btn-danger" id="clearHistory">清空历史</button>
                            <button class="btn btn-danger" id="clearFavorites">清空收藏</button>
                            <button class="btn btn-primary" id="exportData">导出数据</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mobile-action-bar mobile-only">
        <button class="btn btn-primary generate-btn" id="mobileGenerateBtn">✨ 立即生成</button>
        <button class="btn btn-secondary" id="openDrawerBtn">全部功能</button>
    </div>

    <div class="drawer" id="drawer">
        <div class="drawer-overlay" id="drawerOverlay"></div>
        <div class="drawer-content">
            <div class="drawer-item" id="drawerAdvanced">🔓 解锁进阶版</div>
            <div class="drawer-item" id="drawerExpert">🔐 解锁专家版</div>
            <div class="drawer-item" id="drawerTheme">🌙 切换主题</div>
            <div class="drawer-item" id="drawerStats">📊 使用统计</div>
            <div class="drawer-item" id="drawerInvite">🎁 邀请码</div>
            <div class="drawer-item" id="drawerFeedback">💬 意见反馈</div>
        </div>
    </div>

    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🔒 进阶版解锁</h3>
                <button class="modal-close" id="closePasswordModal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>请输入解锁密码</label>
                    <input type="password" class="form-control" id="passwordInput" placeholder="请输入密码">
                </div>
                <button class="btn btn-primary btn-block" id="submitPassword">提交验证</button>
            </div>
        </div>
    </div>

    <div class="modal" id="inviteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🔐 专家版解锁</h3>
                <button class="modal-close" id="closeInviteModal">×</button>
            </div>
            <div class="modal-body">
                <div class="alert alert-info">💡 每日限量10个邀请码，加QQ群：123456789领取</div>
                <div class="form-group">
                    <label>请输入邀请码</label>
                    <input type="text" class="form-control" id="inviteInput" placeholder="请输入邀请码">
                </div>
                <button class="btn btn-primary btn-block" id="submitInvite">提交验证</button>
            </div>
        </div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div class="context-menu-content">
            <div class="context-menu-item" data-action="copy">📋 复制内容</div>
            <div class="context-menu-item" data-action="favorite">⭐ 收藏</div>
            <div class="context-menu-item" data-action="regenerate">🔄 重新生成</div>
            <div class="context-menu-item" data-action="share">📤 分享</div>
            <div class="context-menu-item" data-action="delete">🗑️ 删除</div>
            <div class="context-menu-item" data-action="cancel">❌ 取消</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const ADVANCED_PASSWORDS = ['password123', 'abc123', '123456'];
        const EXPERT_PASSWORDS = ['expert2024', 'super123', 'vip666'];
        let currentContextCard = null;

        // 数据存储
        const storage = {
            get(key) {
                try {
                    return JSON.parse(localStorage.getItem(key) || '[]');
                } catch {
                    return [];
                }
            },
            set(key, value) {
                localStorage.setItem(key, JSON.stringify(value));
            }
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initTabs();
            initButtons();
            initTouchEvents();
            loadHistory();
            loadFavorites();
            // 加载统计
            const stats = storage.get('stats')[0] || { total: 0, advanced: 0, expert: 0 };
            document.getElementById('statTotal').textContent = stats.total;
            document.getElementById('statAdvanced').textContent = stats.advanced;
            document.getElementById('statExpert').textContent = stats.expert;
        });

        // 主题切换
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.body.classList.toggle('light', savedTheme === 'light');
            document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '☀️ 切换浅色' : '🌙 切换深色';

            document.getElementById('themeToggle').addEventListener('click', () => {
                const isLight = document.body.classList.toggle('light');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                document.getElementById('themeToggle').textContent = isLight ? '🌙 切换深色' : '☀️ 切换浅色';
            });

            document.querySelectorAll('[data-theme]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    localStorage.setItem('theme', theme);
                    if (theme === 'auto') {
                        const isLight = !window.matchMedia('(prefers-color-scheme: dark)').matches;
                        document.body.classList.toggle('light', isLight);
                        document.getElementById('themeToggle').textContent = isLight ? '🌙 切换深色' : '☀️ 切换浅色';
                    } else {
                        document.body.classList.toggle('light', theme === 'light');
                        document.getElementById('themeToggle').textContent = theme === 'light' ? '🌙 切换深色' : '☀️ 切换浅色';
                    }
                });
            });

            document.getElementById('drawerTheme').addEventListener('click', () => {
                document.getElementById('themeToggle').click();
                document.getElementById('drawer').classList.remove('active');
            });
        }

        // Tab切换
        function initTabs() {
            // 模式切换
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const mode = btn.dataset.mode;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(`${mode}-mode`).classList.add('active');
                });
            });

            // 移动端导航Tab
            document.querySelectorAll('.mobile-tabs .tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabName = tab.dataset.tab;
                    document.querySelectorAll('.mobile-tabs .tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`${tabName}-content`).classList.add('active');
                    // 移动端切换到生成Tab时显示配置面板
                    if (tabName === 'generate' && window.innerWidth <= 768) {
                        document.getElementById('configPanel').classList.add('active');
                    }
                });
            });
        }

        // 按钮事件
        function initButtons() {
            // 生成按钮
            document.getElementById('generateBtn').addEventListener('click', generatePrompt);
            document.getElementById('mobileGenerateBtn').addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    document.getElementById('configPanel').classList.add('active');
                } else {
                    generatePrompt();
                }
            });

            // 菜单按钮
            document.getElementById('menuBtn').addEventListener('click', () => {
                document.getElementById('drawer').classList.add('active');
            });
            document.getElementById('drawerOverlay').addEventListener('click', () => {
                document.getElementById('drawer').classList.remove('active');
            });

            // 抽屉菜单项
            document.getElementById('drawerAdvanced').addEventListener('click', () => {
                document.getElementById('drawer').classList.remove('active');
                document.getElementById('passwordModal').classList.add('active');
            });
            document.getElementById('drawerExpert').addEventListener('click', () => {
                document.getElementById('drawer').classList.remove('active');
                document.getElementById('inviteModal').classList.add('active');
            });
            document.getElementById('drawerFeedback').addEventListener('click', () => {
                document.getElementById('drawer').classList.remove('active');
                showToast('反馈邮箱：feedback@example.com');
            });
            document.getElementById('drawerInvite').addEventListener('click', () => {
                document.getElementById('drawer').classList.remove('active');
                showToast('官方QQ群：123456789');
            });
            document.getElementById('drawerStats').addEventListener('click', () => {
                document.getElementById('drawer').classList.remove('active');
                const stats = storage.get('stats')[0] || { total: 0, advanced: 0, expert: 0 };
                alert(`使用统计：\n总生成次数：${stats.total}\n进阶版次数：${stats.advanced}\n专家版次数：${stats.expert}`);
            });

            // 模态框关闭
            document.getElementById('closePasswordModal').addEventListener('click', () => {
                document.getElementById('passwordModal').classList.remove('active');
            });
            document.getElementById('closeInviteModal').addEventListener('click', () => {
                document.getElementById('inviteModal').classList.remove('active');
            });

            // 密码提交
            document.getElementById('submitPassword').addEventListener('click', () => {
                const password = document.getElementById('passwordInput').value;
                if (ADVANCED_PASSWORDS.includes(password)) {
                    unlockAdvanced();
                    document.getElementById('passwordModal').classList.remove('active');
                    showToast('进阶版解锁成功，每日可用5次', 'success');
                } else {
                    showToast('密码错误，请重试', 'error');
                }
            });

            // 邀请码提交
            document.getElementById('submitInvite').addEventListener('click', () => {
                const inviteCode = document.getElementById('inviteInput').value;
                if (EXPERT_PASSWORDS.includes(inviteCode)) {
                    unlockExpert();
                    document.getElementById('inviteModal').classList.remove('active');
                    showToast('专家版解锁成功，所有功能已开放', 'success');
                } else {
                    showToast('邀请码无效，请重试', 'error');
                }
            });

            // 底部操作栏打开配置
            document.getElementById('openDrawerBtn').addEventListener('click', () => {
                document.getElementById('drawer').classList.remove('active');
                document.getElementById('configPanel').classList.add('active');
            });

            // 清空历史
            document.getElementById('clearHistory').addEventListener('click', () => {
                if (confirm('确定清空所有历史记录吗？')) {
                    storage.set('history', []);
                    loadHistory();
                    showToast('历史记录已清空', 'success');
                }
            });

            // 清空收藏
            document.getElementById('clearFavorites').addEventListener('click', () => {
                if (confirm('确定清空所有收藏吗？')) {
                    storage.set('favorites', []);
                    loadFavorites();
                    showToast('收藏夹已清空', 'success');
                }
            });

            // 导出数据
            document.getElementById('exportData').addEventListener('click', () => {
                const data = {
                    history: storage.get('history'),
                    favorites: storage.get('favorites'),
                    exportTime: new Date().toISOString()
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `提示词数据_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('数据已导出', 'success');
            });
        }

        // 移动端长按菜单
        function initTouchEvents() {
            let longPressTimer;
            // 全局监听触摸
            document.addEventListener('touchstart', (e) => {
                const card = e.target.closest('.result-card');
                if (!card) return;
                longPressTimer = setTimeout(() => {
                    currentContextCard = card;
                    document.getElementById('contextMenu').classList.add('active');
                }, 600);
            });

            document.addEventListener('touchend', () => clearTimeout(longPressTimer));
            document.addEventListener('touchmove', () => clearTimeout(longPressTimer));

            // 菜单项点击
            document.querySelectorAll('.context-menu-item').forEach(item => {
                item.addEventListener('click', () => {
                    const action = item.dataset.action;
                    handleContextAction(action);
                    document.getElementById('contextMenu').classList.remove('active');
                });
            });

            // PC端右键菜单
            document.addEventListener('contextmenu', (e) => {
                const card = e.target.closest('.result-card');
                if (!card) return;
                e.preventDefault();
                currentContextCard = card;
                // 调整菜单位置到鼠标处
                const menu = document.getElementById('contextMenu');
                menu.style.alignItems = 'flex-start';
                menu.style.justifyContent = 'flex-start';
                menu.style.padding = `${e.clientY}px ${e.clientX}px`;
                menu.classList.add('active');
                // 还原菜单位置
                setTimeout(() => {
                    menu.style.alignItems = '';
                    menu.style.justifyContent = '';
                    menu.style.padding = '';
                }, 100);
            });

            // 点击空白关闭菜单
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.context-menu') && !e.target.closest('.result-card')) {
                    document.getElementById('contextMenu').classList.remove('active');
                }
            });
        }

        function handleContextAction(action) {
            if (!currentContextCard) return;
            const prompt = currentContextCard.querySelector('.prompt-text').textContent;

            switch (action) {
                case 'copy':
                    copyText(prompt);
                    break;
                case 'favorite':
                    addToFavorites(prompt);
                    break;
                case 'regenerate':
                    document.getElementById('task').value = prompt.split('\n')[3] || prompt;
                    configPanel.classList.add('active');
                    generatePrompt();
                    break;
                case 'share':
                    shareText(prompt);
                    break;
                case 'delete':
                    const id = currentContextCard.dataset.id;
                    let history = storage.get('history');
                    history = history.filter(item => item.id !== id);
                    storage.set('history', history);
                    loadHistory();
                    showToast('已删除', 'success');
                    break;
            }
        }

        function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('已复制到剪贴板', 'success');
                }).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('已复制到剪贴板', 'success');
            } catch {
                showToast('复制失败，请手动复制', 'error');
            }
            document.body.removeChild(textarea);
        }

        function shareText(text) {
            if (navigator.share) {
                navigator.share({
                    title: 'AI生成的提示词',
                    text: text
                }).catch(() => copyText(text));
            } else {
                copyText(text);
            }
        }

        // 生成提示词
        function generatePrompt() {
            // 判断当前激活的模式
            const activeMode = document.querySelector('.tab-btn.active').dataset.mode;
            if (activeMode === 'basic') generateBasic();
            else if (activeMode === 'advanced') generateAdvanced();
            else if (activeMode === 'expert') generateExpert();
        }

        function generateBasic() {
            const scene = document.getElementById('scene').value;
            const platform = document.getElementById('platform').value;
            const task = document.getElementById('task').value;
            const requirements = document.getElementById('requirements').value;
            const complexity = document.getElementById('complexity').value;

            if (!task) {
                showToast('请输入任务描述', 'error');
                return;
            }

            const btn = document.getElementById('generateBtn');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="loading"></span> 生成中...';
            btn.disabled = true;

            setTimeout(() => {
                let prompt = `【${scene}场景】\n针对${platform}完成以下任务：\n${task}\n`;
                if (requirements) prompt += `要求：${requirements}\n`;
                if (complexity !== '简单') prompt += complexity === '中等' ? '请简洁清晰输出，符合该平台规范。' : '请分点结构化输出，逻辑清晰，符合该平台使用规则。';

                const result = {
                    id: Date.now().toString(),
                    prompt,
                    scene,
                    platform,
                    mode: '基础版',
                    time: new Date().toLocaleString()
                };

                showResult(result);
                addToHistory(result);
                updateStats('total');

                btn.textContent = originalText;
                btn.disabled = false;

                if (window.innerWidth <= 768) {
                    document.getElementById('configPanel').classList.remove('active');
                }
            }, 800);
        }

        function generateAdvanced() {
            const scene = document.getElementById('scene').value;
            const platform = document.getElementById('platform').value;
            const task = document.getElementById('task').value;
            const requirements = document.getElementById('requirements').value;
            const style = document.getElementById('style') ? document.getElementById('style').value : '专业严谨';
            const language = document.getElementById('language') ? document.getElementById('language').value : '中文';
            const extra = document.getElementById('extraInstruction') ? document.getElementById('extraInstruction').value : '';

            if (!task) {
                showToast('请输入任务描述', 'error');
                return;
            }

            const btn = document.querySelector('#advanced-mode .btn-primary');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="loading"></span> 生成中...';
            btn.disabled = true;

            setTimeout(() => {
                let prompt = `【${scene}场景 | 进阶版】\n目标平台：${platform}\n任务：${task}\n`;
                if (requirements) prompt += `要求：${requirements}\n`;
                prompt += `风格：${style}\n输出语言：${language}\n`;
                if (extra) prompt += `附加规则：${extra}\n`;
                prompt += `输出需符合${platform}的最新使用规范，无违规内容。`;

                const result = {
                    id: Date.now().toString(),
                    prompt,
                    scene,
                    platform,
                    mode: '进阶版',
                    time: new Date().toLocaleString()
                };

                showResult(result);
                addToHistory(result);
                updateStats('advanced');

                btn.textContent = originalText;
                btn.disabled = false;

                if (window.innerWidth <= 768) {
                    document.getElementById('configPanel').classList.remove('active');
                }
            }, 1000);
        }

        function generateExpert() {
            const scene = document.getElementById('scene').value;
            const platform = document.getElementById('platform').value;
            const task = document.getElementById('task').value;
            const chainSteps = document.getElementById('chainSteps') ? document.getElementById('chainSteps').value : '5';
            const solutionCount = document.getElementById('solutionCount') ? document.getElementById('solutionCount').value : '1';

            if (!task) {
                showToast('请输入任务描述', 'error');
                return;
            }

            const btn = document.querySelector('#expert-mode .btn-primary');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="loading"></span> 生成中...';
            btn.disabled = true;

            setTimeout(() => {
                let prompt = `【${scene}场景 | 专家版 | 思维链推导】\n目标平台：${platform}\n\n## 任务描述\n${task}\n\n## 推导步骤（共${chainSteps}步）\n1. 明确任务核心需求与目标受众\n2. 梳理平台特性与输出规则要求\n3. 构建提示词逻辑结构\n4. 优化语言表达，适配平台调性\n5. 校验内容合规性，剔除风险词\n\n## 生成${solutionCount}个备选方案，每个方案附带质检评分（满分10分）\n\n请确保输出符合${platform}最新使用规范，无低俗、违规内容。`;

                const result = {
                    id: Date.now().toString(),
                    prompt,
                    scene,
                    platform,
                    mode: '专家版',
                    time: new Date().toLocaleString()
                };

                showResult(result);
                addToHistory(result);
                updateStats('expert');

                btn.textContent = originalText;
                btn.disabled = false;

                if (window.innerWidth <= 768) {
                    document.getElementById('configPanel').classList.remove('active');
                }
            }, 1200);
        }

        function showResult(data) {
            const container = document.getElementById('resultContainer');
            container.innerHTML = `
                <div class="result-card" data-id="${data.id}">
                    <div class="prompt-text">${data.prompt}</div>
                    <div class="action-bar pc-only">
                        <button class="btn btn-secondary" onclick="copyText(this.closest('.result-card').querySelector('.prompt-text').textContent)">📋 复制</button>
                        <button class="btn btn-secondary" onclick="addToFavorites(this.closest('.result-card').querySelector('.prompt-text').textContent)">⭐ 收藏</button>
                        <button class="btn btn-secondary" onclick="document.getElementById('task').value = this.closest('.result-card').querySelector('.prompt-text').textContent.split('任务：')[1] || ''; generatePrompt()">🔄 重新生成</button>
                        <button class="btn btn-secondary" onclick="shareText(this.closest('.result-card').querySelector('.prompt-text').textContent)">📤 分享</button>
                        <div class="score">模式：${data.mode}</div>
                    </div>
                    <div class="mobile-only" style="font-size:12px;color:var(--text-secondary);margin-top:8px;">
                        长按卡片查看更多操作 | 模式：${data.mode}
                    </div>
                    <div class="tags" style="margin-top:12px;">
                        <span class="tag">#${data.scene}</span>
                        <span class="tag">#${data.platform}</span>
                        <span class="tag">#${new Date().toLocaleDateString()}</span>
                    </div>
                </div>
            `;
        }

        function addToHistory(data) {
            const history = storage.get('history');
            history.unshift(data);
            if (history.length > 50) history.pop();
            storage.set('history', history);
            loadHistory();
        }

        function loadHistory() {
            const history = storage.get('history');
            const container = document.getElementById('historyList');
            if (history.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📚</div>
                        <p>暂无历史记录</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = history.map(item => `
                <div class="result-card" data-id="${item.id}">
                    <div class="prompt-text">${item.prompt}</div>
                    <div style="font-size:12px;color:var(--text-secondary);margin-top:8px;">${item.time} | ${item.mode}</div>
                    <div class="tags" style="margin-top:8px;">
                        <span class="tag">#${item.scene}</span>
                        <span class="tag">#${item.platform}</span>
                    </div>
                </div>
            `).join('');
        }

        function addToFavorites(prompt) {
            const favorites = storage.get('favorites');
            if (favorites.some(item => item.prompt === prompt)) {
                showToast('已在收藏夹中', 'error');
                return;
            }

            favorites.unshift({
                id: Date.now().toString(),
                prompt,
                time: new Date().toLocaleString()
            });
            storage.set('favorites', favorites);
            loadFavorites();
            showToast('已添加到收藏夹', 'success');
        }

        function loadFavorites() {
            const favorites = storage.get('favorites');
            const container = document.getElementById('favoritesList');
            if (favorites.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⭐</div>
                        <p>暂无收藏</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = favorites.map(item => `
                <div class="result-card" data-id="${item.id}">
                    <div class="prompt-text">${item.prompt}</div>
                    <div style="font-size:12px;color:var(--text-secondary);margin-top:8px;">${item.time}</div>
                </div>
            `).join('');
        }

        function unlockAdvanced() {
            const form = document.getElementById('advancedForm');
            const content = document.getElementById('advancedContent');
            form.style.display = 'none';
            content.style.display = 'block';

            content.innerHTML = `
                <div class="form-group">
                    <label>提示词风格</label>
                    <select class="form-control" id="style">
                        <option value="专业严谨">专业严谨</option>
                        <option value="生动有趣">生动有趣</option>
                        <option value="简洁明了">简洁明了</option>
                        <option value="详细具体">详细具体</option>
                        <option value="口语化">口语化</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>输出语言</label>
                    <select class="form-control" id="language">
                        <option value="中文">中文</option>
                        <option value="英文">英文</option>
                        <option value="中英双语">中英双语</option>
                        <option value="日语">日语</option>
                        <option value="韩语">韩语</option>
                        <option value="西班牙语">西班牙语</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>附加指令</label>
                    <textarea class="form-control" id="extraInstruction" placeholder="需要遵守的规则/禁止的内容"></textarea>
                </div>
                <button class="btn btn-primary btn-block" onclick="generateAdvanced()">✨ 进阶版生成</button>
            `;
        }

        function unlockExpert() {
            const form = document.getElementById('expertForm');
            const content = document.getElementById('expertContent');
            form.style.display = 'none';
            content.style.display = 'block';

            content.innerHTML = `
                <div class="form-group">
                    <label>思维链步骤</label>
                    <select class="form-control" id="chainSteps">
                        <option value="3">3步推导</option>
                        <option value="5">5步推导</option>
                        <option value="7">7步推导（更详细）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>生成方案数量</label>
                    <select class="form-control" id="solutionCount">
                        <option value="1">1个最优方案</option>
                        <option value="3">3个备选方案</option>
                        <option value="5">5个备选方案</option>
                    </select>
                </div>
                <button class="btn btn-success btn-block" onclick="generateExpert()">✨ 专家版生成</button>
            `;
        }

        function updateStats(type) {
            const stats = storage.get('stats')[0] || { total: 0, advanced: 0, expert: 0 };
            if (type === 'total') stats.total++;
            if (type === 'advanced') stats.advanced++;
            if (type === 'expert') stats.expert++;
            storage.set('stats', [stats]);
            document.getElementById('statTotal').textContent = stats.total;
            document.getElementById('statAdvanced').textContent = stats.advanced;
            document.getElementById('statExpert').textContent = stats.expert;
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 快捷键
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                generatePrompt();
            }
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal, .drawer, .context-menu, .config-panel').forEach(el => {
                    el.classList.remove('active');
                });
            }
        });
    </script>
</body>
</html>
